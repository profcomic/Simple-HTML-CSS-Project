<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Toy Sorting Game</title>
    <!-- Here is how we link our separate CSS file! -->
    <link rel="stylesheet" href="style-sheet.css">
</head>
<body>

    <h1>🧸 Toy Sorting Game 🚀</h1>
    <p>Arrange and style your toy boxes neatly on the shelf!</p>

    <!-- Our Shelf Container -->
    <div class="shelf">
        <!-- Toy Box 1: Styled using External CSS class -->
        <div class="toy-box red-box">Teddy Bear</div>
        
        <!-- Toy Box 2: Styled using External CSS class -->
        <div class="toy-box blue-box">Toy Train</div>
        
        <!-- Toy Box 3: Using INLINE CSS just for this specific green box -->
        <div class="toy-box" style="background-color: #2ecc71; color: white;">Race Car</div>
    </div>

</body>
</html>
